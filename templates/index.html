<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TriedingView</title>
<link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<script src="{{ url_for('static', filename='chart_support_resistance.js') }}"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<div class="app">

<!-- CENTER -->
<div class="center">
  {% include 'partials/toolbar.html' %}

  {% include 'partials/signal_chips.html' %}

  <!-- CHART -->
  <div class="chart-area">
    <button class="wl-toggle" id="wl-toggle" onclick="toggleWatchlist()" title="Toggle Watchlist">&#9654;</button>
    <div class="chart-tag" id="chart-tag"></div>
    <div class="chart-legend" id="chart-legend"></div>
    <div id="chart-container"></div>
    <div id="vol-profile" style="display:none"></div>

    <!-- Chart navigation toolbar (hover bottom-center) -->
    <div class="chart-nav" id="chart-nav">
      <button class="cn-btn" onclick="chartNavZoom(1)" title="Zoom In">&#x2795;</button>
      <button class="cn-btn" onclick="chartNavZoom(-1)" title="Zoom Out">&#x2796;</button>
      <div class="cn-sep"></div>
      <button class="cn-btn" onclick="chartNavScroll(-1)" title="Scroll Left">&#x25C0;</button>
      <button class="cn-btn" onclick="chartNavScroll(1)" title="Scroll Right">&#x25B6;</button>
      <div class="cn-sep"></div>
      <button class="cn-btn" onclick="chartNavReset()" title="Reset View" style="font-size:12px">&#x21BA;</button>
      <button class="cn-btn" onclick="chartNavFit()" title="Fit All" style="font-size:11px;width:auto;padding:0 6px">Fit</button>
      <div class="cn-sep"></div>
      <span class="cn-lbl" id="cn-bars-lbl"></span>
    </div>

    <!-- Backtest toggle button -->
    <button class="bt-toggle" id="bt-btn" onclick="openBacktestTab()" title="Open Backtest in a new tab">
      <span class="dot"></span>
      <span id="bt-lbl">Backtest</span>
    </button>
  </div>

  {% include 'partials/backtest_panel.html' %}
</div>

{% include 'partials/watchlist.html' %}

{% include 'partials/financials_modal.html' %}

</div><!-- /app -->

<script src="{{ url_for('static', filename='js/chart_core.js') }}"></script>
<script src="{{ url_for('static', filename='js/chart_legend.js') }}"></script>
<script src="{{ url_for('static', filename='js/chart_sr.js') }}"></script>
<script src="{{ url_for('static', filename='js/chart_overlays.js') }}"></script>
<script src="{{ url_for('static', filename='js/chart_signals.js') }}"></script>
<script src="{{ url_for('static', filename='js/financials_modal.js') }}"></script>
<script src="{{ url_for('static', filename='js/url_state.js') }}"></script>
<script src="{{ url_for('static', filename='js/backtest_panel.js') }}"></script>
<script src="{{ url_for('static', filename='js/chart_load.js') }}"></script>
<script src="{{ url_for('static', filename='js/watchlist.js') }}"></script>
<script src="{{ url_for('static', filename='js/app_init.js') }}"></script>
</body>
</html>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="tk-head">
      <input type="text" id="ticker" value="BTC-USD" class="inp" style="width:88px;font-weight:700;font-size:13px;text-transform:uppercase;display:none">
      <span class="tk-sym" id="tk-sym">BTC-USD</span>
      <button type="button" class="tk-action" id="financials-btn" onclick="openFinancials()">Financials</button>
      <span class="tk-price" id="tk-price">--</span>
      <span class="tk-chg" id="tk-chg">--</span>
      <span class="tk-name" id="tk-name"></span>
    </div>
    <div class="tb-grp">
      <select id="interval" class="inp" style="cursor:pointer" onchange="chartStart=defaultStart(this.value);loadChart()"><option value="1d" selected>1D</option><option value="1wk">1W</option><option value="1mo">1M</option></select>
    </div>
    <div class="tb-grp tb-range-presets" aria-label="Chart range presets">
      <button type="button" class="tb-range-btn" onclick="chartRangePresetYears(1)">1Y</button>
      <button type="button" class="tb-range-btn" onclick="chartRangePresetYears(3)">3Y</button>
      <button type="button" class="tb-range-btn" onclick="chartRangePresetYears(5)">5Y</button>
      <button type="button" class="tb-range-btn" onclick="chartRangePresetReset()">Default</button>
    </div>
    <div class="tb-grp">
      <span class="tb-lbl">ST</span>
      <input type="number" id="period" value="10" min="1" max="100" class="inp inp-n">
      <span style="color:var(--text-4)">/</span>
      <input type="number" id="multiplier" value="2.5" min="0.1" max="10" step="0.1" class="inp inp-n">
    </div>
    <div id="trend-flip-controls" class="trend-flip-controls">
      <span id="trend-flip-info"></span>
      <button type="button" id="trend-flip-aggregate-btn" class="trend-flip-aggregate-btn" onclick="toggleTrendFlipAggregate(event)">
        <span>Pulse</span>
        <span id="trend-flip-aggregate-state" class="tf-agg-state">Mixed</span>
      </button>
      <div id="trend-flip-aggregate-popover" class="trend-flip-aggregate-popover" onclick="event.stopPropagation()"></div>
    </div>
    <div class="ld" id="loading"><div class="spin"></div><span id="loading-label">Loading chart…</span></div>
  </div>

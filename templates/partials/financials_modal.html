<div class="fin-backdrop" id="financials-modal" onclick="closeFinancials()">
  <div class="fin-modal" onclick="event.stopPropagation()">
    <div class="fin-head">
      <div>
        <h3 id="financials-title">Financials</h3>
        <div class="fin-sub" id="financials-subtitle"></div>
      </div>
      <button type="button" class="fin-close" onclick="closeFinancials()">&times;</button>
    </div>
    <div class="fin-body">
      <div class="fin-status" id="financials-status">Select a company to view valuation and financial metrics.</div>
      <div class="fin-meta" id="financials-meta"></div>
      <div class="fin-grid" id="financials-grid"></div>
      <div class="fin-summary" id="financials-summary" style="display:none"></div>
    </div>
  </div>
</div>

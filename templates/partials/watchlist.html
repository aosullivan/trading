<!-- WATCHLIST (RIGHT) -->
<div class="watchlist" id="wl-panel">
  <div class="wl-drag" id="wl-drag"></div>
  <div class="wl-head">
    <div class="wl-view-tabs">
      <button class="wl-view-tab active" type="button" data-view="watchlist" onclick="switchWLView('watchlist')">Watchlist</button>
      <button class="wl-view-tab" type="button" data-view="trends" onclick="switchWLView('trends')">Trends</button>
    </div>
    <div class="wl-head-meta">
      <span class="wl-refresh-state live" id="wl-refresh-state" title="Watchlist refresh is live">LIVE</span>
      <span class="wl-cnt" id="wl-count">0</span>
    </div>
  </div>
  <div class="wl-add" id="wl-add-row">
    <input type="text" id="wl-input" placeholder="Add ticker..." onkeydown="if(event.key==='Enter')addWL()">
    <button onclick="addWL()">+</button>
  </div>
  <div class="wl-tabs" id="wl-tabs">
    <button class="wl-tab active" data-tab="all" onclick="switchWLTab('all')">All</button>
    <button class="wl-tab" data-tab="indexes" onclick="switchWLTab('indexes')">Indexes</button>
    <button class="wl-tab" data-tab="treasuries" onclick="switchWLTab('treasuries')">Treasury</button>
    <button class="wl-tab" data-tab="semis" onclick="switchWLTab('semis')">Semis</button>
    <button class="wl-tab" data-tab="tech" onclick="switchWLTab('tech')">Tech</button>
    <button class="wl-tab" data-tab="software" onclick="switchWLTab('software')">Software</button>
    <button class="wl-tab" data-tab="etfs" onclick="switchWLTab('etfs')">ETFs</button>
    <button class="wl-tab" data-tab="crypto" onclick="switchWLTab('crypto')">Crypto</button>
    <button class="wl-tab" data-tab="misc" onclick="switchWLTab('misc')">Misc</button>
  </div>
  <div class="wl-tabs wl-trend-tabs" id="wl-trend-tabs" style="display:none">
    <button class="wl-tab active" data-frame="daily" onclick="switchWLTrendFrame('daily')">Daily</button>
    <button class="wl-tab" data-frame="weekly" onclick="switchWLTrendFrame('weekly')">Weekly</button>
  </div>
  <div class="wl-tabs wl-trend-side-tabs" id="wl-trend-side-tabs" style="display:none">
    <button class="wl-tab wl-tab-bull active" data-side="bullish" onclick="switchWLTrendSide('bullish')">Bullish</button>
    <button class="wl-tab wl-tab-bear" data-side="bearish" onclick="switchWLTrendSide('bearish')">Bearish</button>
    <button class="wl-tab wl-tab-mixed" data-side="mixed" onclick="switchWLTrendSide('mixed')">Mixed</button>
  </div>
  <div class="wl-cols" id="wl-quote-cols"><span class="wl-sort" onclick="sortWL('sym')">Symbol<i id="wl-arrow-sym"></i></span><span class="wl-sort" onclick="sortWL('last')">Last<i id="wl-arrow-last"></i></span><span class="wl-sort" onclick="sortWL('chg')">Chg<i id="wl-arrow-chg"></i></span><span class="wl-sort" onclick="sortWL('chg_pct')">Chg%<i id="wl-arrow-chg_pct"></i></span></div>
  <div class="wl-cols wl-trend-cols" id="wl-trend-cols" style="display:none">
    <span class="wl-sort" onclick="sortWLTrends('ticker')">Symbol<i id="wl-trend-arrow-ticker"></i></span>
    <span class="wl-sort" onclick="sortWLTrends('flip')">Flip<i id="wl-trend-arrow-flip"></i></span>
    <span class="wl-sort active" onclick="sortWLTrends('score')">Strength<i id="wl-trend-arrow-score"> ▼</i></span>
  </div>
  <div class="wl-list" id="wl-items"></div>
</div>

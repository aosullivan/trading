<div class="trade-score-backdrop" id="trade-score-modal" onclick="closeTradeScoreModal()">
  <div class="trade-score-modal" onclick="event.stopPropagation()">
    <div class="trade-score-head">
      <div>
        <h3 id="trade-score-title">Trade Score</h3>
        <div class="trade-score-sub" id="trade-score-subtitle"></div>
      </div>
      <button class="trade-score-close" type="button" onclick="closeTradeScoreModal()" aria-label="Close trade score details">&times;</button>
    </div>
    <div class="trade-score-body">
      <div class="trade-score-status" id="trade-score-status"></div>
      <div class="trade-score-topline" id="trade-score-topline"></div>
      <div class="trade-score-grid" id="trade-score-grid"></div>
      <div class="trade-score-formula" id="trade-score-formula"></div>
      <div class="trade-score-highlights" id="trade-score-highlights"></div>
      <div class="trade-score-structure" id="trade-score-structure"></div>
    </div>
  </div>
</div>
